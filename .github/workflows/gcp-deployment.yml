name: Capstone Project Services - GCP Deployment
on: push

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VM_NAME: vm-services-seed
      INSTANCE_GROUP: mig-services
      INSTANCE_TEMPLATE: temp-vm-services-seed-v1
      REGION: asia-southeast1
      ZONE: asia-southeast1-c
      USER_NAME: zeejmaleeshamadushanka
      IMAGE_NAME: vm-services-seed-boot-image

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up gcloud Cloud SDK environment
        uses: google-github-actions/setup-gcloud@v3.0.1

      - name: Get Dynamic VM Name and Start Instance
        run: |
          # This finds the real name (like mig-services-mj51) so the start command doesn't 404
          ACTUAL_NAME=$(gcloud compute instance-groups managed list-instances ${{ env.INSTANCE_GROUP }} \
            --region=${{ env.REGION }} \
            --format="value(instance.scope().basename())" \
            --limit=1)
          echo "Detected VM Name: $ACTUAL_NAME"
          echo "ACTUAL_VM=$ACTUAL_NAME" >> $GITHUB_ENV
          gcloud compute instances start $ACTUAL_NAME --zone=${{ env.ZONE }}

      - name: Connect, Sync Code, and Build
        run: |
          gcloud compute ssh ${{ env.USER_NAME }}@${{ env.ACTUAL_VM }} --zone=${{ env.ZONE }} --command "
            echo 'Connected successfully!'
          
            # 1. Fix environment (Ensures Java 23 and Maven are visible to the script)
            sudo apt-get update -y
            sudo apt-get install -y openjdk-23-jdk maven || sudo apt-get install -y openjdk-21-jdk maven
            export PATH=\$PATH:/usr/bin:/usr/local/bin:/usr/share/maven/bin
          
            # 2. Force-Sync Code (Lecturer code + Force-Reset)
            cd Capstone-Project-Services/ &&
            git fetch --all &&
            git reset --hard origin/main &&
            git submodule foreach --recursive 'git clean -fd && git reset --hard' &&
            git submodule update --init --recursive --force &&
          
            # 3. Build the project
            source ~/.bashrc &&
            mvn clean package -DskipTests
          "

      - name: Stop the instance
        run: gcloud compute instances stop ${{ env.ACTUAL_VM }} --zone=${{ env.ZONE }}

      - name: Delete the boot disk image
        run: gcloud compute images delete ${{ env.IMAGE_NAME }} --quiet
        continue-on-error: true

      - name: Create a new boot disk image
        run: |
          gcloud compute images create ${{ env.IMAGE_NAME }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --source-disk=${{ env.ACTUAL_VM }} \
            --source-disk-zone=${{ env.ZONE }} \
            --storage-location=${{ env.REGION }}

      - name: Update the instance group with the new image
        run: |
          gcloud compute instance-groups managed rolling-action replace ${{ env.INSTANCE_GROUP }} \
            --region=${{ env.REGION }} \
            --max-unavailable=0 \
            --replacement-method=substitute \
            --max-surge=3